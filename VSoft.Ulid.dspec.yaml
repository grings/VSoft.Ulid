# DPM package spec file
# Used to build packages

min client version: 1.0
# metadata describes the package to the user
metadata:
  id: VSoft.Ulid
  version: 1.1.3
  authors: [ Vincent Parrett ]
  description: ULID generator/parser -  Universally Unique Lexicographically Sortable Identifier
  projectUrl: https://github.com/VSoftTechnologies/VSoft.Ulid
  repositoryUrl: https://github.com/VSoftTechnologies/VSoft.Ulid
  license: Apache-2.0
  readme: README.md
  copyright: Vincent Parrett and contributors
  tags: [ Uid, Ulid, parser ]
  repositoryCommit: #HASH#

variables:
  packageSource: Rad Studio $compilernoprefix$
  
targetPlatforms:
  - compiler from: delphixe2
    compiler to: delphi13.0
    platforms: [ win32, win64 ]

templates:
  - name: default

    source:
      - src: ./LICENSE.txt
      - src: ./source/*.pas
      - src: ./packages/$packageSource$/*.dpk
      - src: ./packages/$packageSource$/*.dproj
    build:
      - project: ./packages/$packageSource$/VSoft.UlidR.dproj
